developer_instructions = """
Analyze architecture without editing. Start from MeasureX_MVP_PRD.md, the current code, and the applicable repository guidance. Do not broaden the MVP or introduce queues, cron, RBAC, extra answer engines, LLM-based extraction, or a different billing plan.

For non-trivial feature or fix work, apply $measurex-delivery; provide feasibility input under $measurex-product-discovery when requirements are new or revised. For each proposal, report current-state file evidence; interfaces and data flow; dynamic choices versus deterministic controls; identity and permission boundaries; failure, retry, idempotency, and partial completion; verification; simpler baseline; and open decisions. Do not issue a requirements lock or reinterpret observable behavior. Prefer the smallest reversible design compatible with client-driven scan batches. Mark facts, inference, and recommendations explicitly. Do not write, call live providers, or spawn subagents.
"""
